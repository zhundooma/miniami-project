<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIAMI | 高階資產清算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .miniami-card { border: 1px solid transparent; background: linear-gradient(#020617, #020617) padding-box, linear-gradient(45deg, #3b82f6, #8b5cf6) border-box; }
        .glow-gold { box-shadow: 0 0 80px rgba(234, 179, 8, 0.15); }
    </style>
</head>
<body class="p-6 md:p-24 min-h-screen flex flex-col items-center text-center">

    <header class="w-full max-w-4xl mb-16">
        <h1 class="text-8xl font-black mb-4 tracking-tighter text-blue-500 italic">MINIAMI</h1>
        <p class="text-slate-500 text-[10px] tracking-[0.8em] uppercase font-black font-mono">Taichung Nantun // V28.0 Audit Guard</p>
    </header>

    <main class="w-full max-w-xl">
        <div id="authArea" class="hidden mb-12">
            <div class="miniami-card p-10 rounded-[3rem] bg-slate-900/90">
                <input type="password" id="keyInput" placeholder="輸入 API Key (AIza...)" class="w-full p-5 bg-black border border-slate-800 rounded-2xl text-white text-center mb-4">
                <button onclick="saveKey()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">啟動節點</button>
            </div>
        </div>

        <div id="searchApp" class="miniami-card p-12 mb-12 rounded-[3.5rem] bg-slate-900/95 glow-gold">
            <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-10">AI 全球價格精煉終端</h2>
            <div class="space-y-6">
                <input type="text" id="itemName" placeholder="例如: Switch 2 或 iPhone 17" class="w-full p-7 bg-black border border-slate-800 rounded-[1.5rem] text-white font-black text-2xl outline-none">
                <button onclick="runV28()" id="runBtn" class="w-full bg-blue-600 text-white p-7 rounded-[1.5rem] font-black text-3xl hover:bg-blue-500 transition-all">
                    執行深度清算
                </button>
            </div>
            
            <div id="auditStatus" class="hidden mt-12 space-y-4 text-left border-t border-slate-800 pt-8">
                <div id="step1" class="text-[10px] font-black text-slate-600 uppercase tracking-widest">○ 掃描市場實時數據...</div>
                <div id="step2" class="text-[10px] font-black text-slate-600 uppercase tracking-widest">○ 排除「鬼單」與配件雜訊...</div>
            </div>
        </div>

        <div id="resultArea" class="hidden animate-in fade-in zoom-in duration-700">
            <div class="miniami-card p-12 bg-slate-900 rounded-[4rem] shadow-2xl">
                <h3 id="targetName" class="text-3xl font-black text-blue-400 uppercase mb-8 border-b border-slate-800 pb-6"></h3>
                <div class="space-y-10 mb-12">
                    <div class="flex flex-col gap-4">
                        <div class="flex justify-between items-center text-slate-400 text-sm font-black uppercase">
                            <span>驗證來源 (<span id="sourceLabel" class="text-blue-500">掃描中</span>)</span>
                            <span class="text-3xl text-white" id="twPrice">--</span>
                        </div>
                        <button id="sourceBtn" class="w-full py-3 bg-slate-800/50 hover:bg-slate-700 text-[11px] font-black text-slate-300 rounded-xl border border-slate-700 tracking-widest uppercase">
                            查看即時比價網頁
                        </button>
                    </div>
                    <div class="flex justify-between items-center border-t border-slate-800 pt-10">
                        <span class="text-blue-500 text-sm font-black uppercase tracking-widest">MINIAMI 清算價</span>
                        <span class="text-7xl text-white font-black" id="finalQuote">--</span>
                    </div>
                </div>
                <div id="profitHint" class="mb-10 p-6 bg-blue-900/20 rounded-2xl border border-blue-800 text-blue-400 font-bold text-sm"></div>
                <button onclick="window.open('https://line.me/ti/p/您的LINE')" class="w-full bg-[#06C755] text-white py-8 rounded-[2rem] font-black text-3xl shadow-xl">預約南屯面交</button>
            </div>
        </div>
    </main>

    <script>
        window.onload = () => { if(!localStorage.getItem('MINIAMI_KEY')) document.getElementById('authArea').classList.remove('hidden'); }
        function saveKey() { const k = document.getElementById('keyInput').value; if(k.startsWith('AIza')) { localStorage.setItem('MINIAMI_KEY', k); location.reload(); } }
        function resetKey() { localStorage.removeItem('MINIAMI_KEY'); location.reload(); }

        async function runV28() {
            const item = document.getElementById('itemName').value;
            const API_KEY = localStorage.getItem('MINIAMI_KEY');
            if(!item || !API_KEY) return;

            const btn = document.getElementById('runBtn');
            const status = document.getElementById('auditStatus');
            const resultArea = document.getElementById('resultArea');
            
            btn.disabled = true;
            status.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
                
                // V28.0 指令優化：強制 AI 進行「常識對齊」
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `任務：清算「${item}」價格。
                        1. 必須是全新硬體主機。排除所有標題包含「維修」、「二手」、「螢幕」、「零件」的價格。
                        2. 找尋台灣蝦皮、MOMO 的中位數全新品售價。
                        3. 若價格低於 12,000 TWD 且商品為 Switch 2，則自動判定為數據錯誤，請尋找下一個真實價格。
                        4. 回傳 JSON：{"jp":數字, "tw":數字, "platform":"來源名稱"}` }] }]
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text.match(/\{.*\}/s)[0]);

                // 公式計算
                const EX_RATE = 0.2013;
                const landed = ( (result.jp / 1.1) * EX_RATE ) * 1.05 + 800;
                let final = result.tw <= landed ? result.tw : landed + (result.tw - landed) * 0.5;

                document.getElementById('targetName').innerText = item;
                document.getElementById('sourceLabel').innerText = result.platform || "市場數據";
                document.getElementById('twPrice').innerText = `NT$ ${Math.round(result.tw).toLocaleString()}`;
                document.getElementById('finalQuote').innerText = `NT$ ${Math.round(final).toLocaleString()}`;
                
                // 導流連結優化
                const p = result.platform || "shopee";
                const searchUrl = p.toLowerCase().includes('shopee') ? `https://shopee.tw/search?keyword=${encodeURIComponent(item)}&page=0&sortBy=relevancy` : `https://www.momoshop.com.tw/search/searchShop.jsp?keyword=${encodeURIComponent(item)}`;
                document.getElementById('sourceBtn').onclick = () => window.open(searchUrl);
                
                document.getElementById('profitHint').innerText = result.tw <= landed ? "🏠 目前本地採購優勢。" : `💎 已對沖利差 NT$ ${Math.round((result.tw - landed)*0.5).toLocaleString()}`;

                setTimeout(() => { status.classList.add('hidden'); resultArea.classList.remove('hidden'); }, 800);
            } catch (err) { alert("節點同步中，請稍後。"); } finally { btn.disabled = false; }
        }
    </script>
</body>
</html>
