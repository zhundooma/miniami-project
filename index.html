<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIAMI | 真實 AI 清算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .gradient-border { border: 1px solid transparent; background: linear-gradient(#020617, #020617) padding-box, linear-gradient(45deg, #3b82f6, #8b5cf6) border-box; }
        .glow { box-shadow: 0 0 50px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="p-6 md:p-20 min-h-screen">

    <header class="max-w-4xl mx-auto text-center mb-16">
        <h1 class="text-7xl font-black mb-4 tracking-tighter text-blue-500 italic">MINIAMI</h1>
        <p class="text-slate-500 text-[10px] tracking-[0.8em] uppercase font-black">Node: Taichung Central // V2.2 Ultimate</p>
    </header>

    <main class="max-w-xl mx-auto">
        <div class="gradient-border p-10 mb-12 rounded-[3rem] glow bg-slate-900/90">
            <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-8">AI 全球價格獲取終端</h2>
            <div class="space-y-6">
                <input type="text" id="itemName" placeholder="例如：iPhone 17 Pro Max" 
                       class="w-full p-6 bg-black border border-slate-800 rounded-[1.5rem] focus:ring-4 focus:ring-blue-500/50 text-white font-medium outline-none text-2xl">
                <button onclick="runHardcoreAI()" id="runBtn" class="w-full bg-blue-600 text-white p-7 rounded-[1.5rem] font-black text-3xl hover:bg-blue-500 transition shadow-2xl">
                    啟動 AI 實時清算
                </button>
            </div>
            
            <div id="loading" class="hidden mt-12 flex flex-col items-center">
                <div class="animate-spin rounded-full border-4 border-slate-800 border-t-blue-500 h-16 w-16 mb-6"></div>
                <span id="loadText" class="text-[10px] font-black text-blue-400 uppercase tracking-widest">正在強制調用 AI 算力節點...</span>
            </div>
        </div>

        <div id="resultArea" class="hidden">
            <div class="gradient-border p-12 relative overflow-hidden bg-slate-900 rounded-[4rem]">
                <h3 id="targetName" class="text-2xl font-black text-blue-400 uppercase mb-8 border-b border-slate-800 pb-4"></h3>
                
                <div class="space-y-8 mb-16">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500 text-xs font-black uppercase tracking-widest">台灣官方定價</span>
                        <span class="font-black text-3xl text-slate-200" id="twPrice">--</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-slate-800 pt-8">
                        <span class="text-blue-500 text-xs font-black uppercase tracking-widest">MINIAMI 清算報價</span>
                        <span class="font-black text-6xl text-white" id="finalQuote">--</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6 mb-12 bg-black/50 p-6 rounded-3xl border border-slate-800 text-center">
                    <div>
                        <p class="text-[10px] text-slate-600 uppercase font-black mb-2">客戶節省</p>
                        <p class="text-emerald-400 font-black text-2xl" id="clientGain">--</p>
                    </div>
                    <div class="border-l border-slate-800">
                        <p class="text-[10px] text-slate-600 uppercase font-black mb-2">管家收益</p>
                        <p class="text-blue-400 font-black text-2xl" id="serviceFee">--</p>
                    </div>
                </div>

                <a href="https://line.me/ti/p/您的LINE" class="block w-full bg-[#06C755] text-white py-7 rounded-[2rem] font-black text-2xl text-center">
                    面交預約 (台中南屯/西屯)
                </a>
            </div>
        </div>

        <div id="errorLog" class="hidden mt-10 p-6 bg-red-900/10 border border-red-900/30 rounded-3xl font-mono text-[10px] text-red-500 whitespace-pre-wrap leading-relaxed"></div>
    </main>

    <script>
        const API_KEY = "AIzaSyAZKp5sb6lYyHeF9rXKu19aDFVoR6zCbSc";

        async function runHardcoreAI() {
            const item = document.getElementById('itemName').value;
            if(!item) return;

            const btn = document.getElementById('runBtn');
            const loader = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            const errorLog = document.getElementById('errorLog');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');
            errorLog.classList.add('hidden');

            // 測試清單：這次我們換一個寫法，直接嘗試最強路徑
            const endpoints = [
                { url: `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, name: "Gemini 1.5 Flash" },
                { url: `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, name: "Gemini Pro" }
            ];

            let success = false;
            let combinedErrors = "";

            for (let ep of endpoints) {
                try {
                    const response = await fetch(ep.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `你現在是清算機器人。產品"${item}"。請回傳JSON格式:{"jp":日本售價數字,"tw":台灣售價數字}。不要回傳任何文字。` }] }]
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        const rawText = data.candidates[0].content.parts[0].text;
                        const prices = JSON.parse(rawText.match(/\{.*\}/s)[0]);
                        renderResult(item, prices.jp, prices.tw);
                        success = true;
                        break;
                    } else {
                        combinedErrors += `[${ep.name}] 報錯: ${data.error.message}\n`;
                    }
                } catch (e) {
                    combinedErrors += `[${ep.name}] 系統異常: ${e.message}\n`;
                }
            }

            if (!success) {
                errorLog.innerText = "❌ AI 調用失敗報告：\n" + combinedErrors + "\n提示：請確認您的 API Key 是否在 Google AI Studio 中啟用了 'Generative Language API'。";
                errorLog.classList.remove('hidden');
            }

            btn.disabled = false;
            loader.classList.add('hidden');
        }

        function renderResult(name, jp, tw) {
            const EX_RATE = 0.2013;
            const landed = ( (jp / 1.1) * EX_RATE ) * 1.05 + 800;
            const split = (tw - landed) * 0.5;

            document.getElementById('targetName').innerText = name;
            document.getElementById('twPrice').innerText = `NT$ ${tw.toLocaleString()}`;
            document.getElementById('clientGain').innerText = `NT$ ${Math.round(split).toLocaleString()}`;
            document.getElementById('serviceFee').innerText = `NT$ ${Math.round(split).toLocaleString()}`;
            document.getElementById('finalQuote').innerText = `NT$ ${Math.round(landed + split).toLocaleString()}`;
            document.getElementById('resultArea').classList.remove('hidden');
        }
    </script>
</body>
</html>
