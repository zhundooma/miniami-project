<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIAMI | 清算節點</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .miniami-card { border: 1px solid transparent; background: linear-gradient(#020617, #020617) padding-box, linear-gradient(45deg, #3b82f6, #8b5cf6) border-box; }
        .glow-blue { box-shadow: 0 0 40px rgba(59, 130, 246, 0.25); }
    </style>
</head>
<body class="p-6 md:p-20 min-h-screen">

    <header class="max-w-4xl mx-auto text-center mb-16">
        <h1 class="text-7xl font-black mb-4 tracking-tighter text-blue-500 italic">MINIAMI</h1>
        <p class="text-slate-500 text-[10px] tracking-[0.7em] uppercase font-black">2026 Production Node // Taichung Nantun</p>
    </header>

    <main class="max-w-xl mx-auto">
        <div class="miniami-card p-10 mb-12 rounded-[3rem] glow-blue bg-slate-900/90">
            <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-8">真實 AI 跨境數據清算 (V6.0)</h2>
            <div class="space-y-6">
                <input type="text" id="itemName" placeholder="例如：iPhone 17 Pro Max" 
                       class="w-full p-6 bg-black border border-slate-800 rounded-[1.5rem] focus:ring-4 focus:ring-blue-500/50 text-white font-medium outline-none text-2xl">
                <button onclick="runUltimateClearing()" id="runBtn" class="w-full bg-blue-600 text-white p-7 rounded-[1.5rem] font-black text-3xl hover:bg-blue-500 transition-all active:scale-95 shadow-2xl">
                    執行 AI 實時清算
                </button>
            </div>
            
            <div id="loading" class="hidden mt-12 flex flex-col items-center">
                <div class="animate-spin rounded-full border-4 border-slate-800 border-t-blue-500 h-16 w-16 mb-6"></div>
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em] animate-pulse">連線至 Google 核心算力...</span>
            </div>
        </div>

        <div id="resultArea" class="hidden animate-in fade-in zoom-in duration-500">
            <div class="miniami-card p-12 bg-slate-900 rounded-[4rem] shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 text-slate-800 font-black text-5xl italic opacity-20">MINIAMI</div>
                
                <h3 id="targetName" class="text-3xl font-black text-blue-400 uppercase mb-10 border-b border-slate-800 pb-4"></h3>
                
                <div class="space-y-8 mb-16">
                    <div class="flex justify-between items-center text-slate-400 text-sm font-black uppercase">
                        <span>市場參考售價 (TW)</span>
                        <span class="text-3xl text-white" id="twPrice">--</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-slate-800 pt-8">
                        <span class="text-blue-500 text-sm font-black uppercase tracking-widest">MINIAMI 最終清算價</span>
                        <span class="text-6xl text-white font-black" id="finalQuote">--</span>
                    </div>
                </div>

                <div class="bg-black/50 p-8 rounded-3xl border border-slate-800 text-center mb-10">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-[10px] text-slate-600 uppercase font-black mb-1">客戶節省</p>
                            <p class="text-emerald-400 font-black text-2xl" id="clientGain">--</p>
                        </div>
                        <div class="border-l border-slate-800">
                            <p class="text-[10px] text-slate-600 uppercase font-black mb-1">管家服務</p>
                            <p class="text-blue-400 font-black text-2xl" id="serviceFee">--</p>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <button onclick="window.open('https://line.me/ti/p/您的LINEID')" class="w-full bg-[#06C755] text-white py-6 rounded-2xl font-black text-2xl text-center shadow-xl hover:brightness-110 transition">
                        聯繫管家 (面交預約)
                    </button>
                    <p class="text-center text-[9px] text-slate-600 font-black tracking-widest">TAICHUNG NANTUN HUB // 50-50 PROFIT SPLIT</p>
                </div>
            </div>
        </div>

        <div id="errorArea" class="hidden mt-10 p-6 bg-red-900/10 border border-red-900/30 rounded-3xl font-mono text-[11px] text-red-500 whitespace-pre-wrap"></div>
    </main>

    <script>
        const API_KEY = "AIzaSyAZKp5sb6lYyHeF9rXKu19aDFVoR6zCbSc";

        async function runUltimateClearing() {
            const item = document.getElementById('itemName').value;
            if(!item) return;

            const btn = document.getElementById('runBtn');
            const loader = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            const errorArea = document.getElementById('errorArea');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');
            errorArea.classList.add('hidden');

            try {
                // 修正點：切換至 v1beta 並使用精確的模型名稱
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你現在是跨境資產專家。產品「${item}」。請回傳 JSON：{"jp":日幣含稅售價, "tw":台灣官方售價}。不准有其他文字。` }] }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(`[404 修復嘗試失敗]\n代碼: ${response.status}\n原因: ${data.error.message}\n提示: 請確認此 API Key 權限是否包含 Flash-Latest 模型。`);
                }

                const text = data.candidates[0].content.parts[0].text;
                const prices = JSON.parse(text.match(/\{.*\}/s)[0]);

                // 清算邏輯
                const EX_RATE = 0.2013;
                const landed = ( (prices.jp / 1.1) * EX_RATE ) * 1.05 + 800;
                const gap = prices.tw - landed;
                const split = gap * 0.5;

                document.getElementById('targetName').innerText = item;
                document.getElementById('twPrice').innerText = `NT$ ${prices.tw.toLocaleString()}`;
                document.getElementById('clientGain').innerText = `NT$ ${Math.round(split).toLocaleString()}`;
                document.getElementById('serviceFee').innerText = `NT$ ${Math.round(split).toLocaleString()}`;
                document.getElementById('finalQuote').innerText = `NT$ ${Math.round(landed + split).toLocaleString()}`;
                
                resultArea.classList.remove('hidden');

            } catch (err) {
                errorArea.innerText = `❌ AI 節點通訊異常：\n${err.message}`;
                errorArea.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
