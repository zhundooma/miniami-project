<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIAMI | AI 實時清算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .gradient-border { border: 1px solid transparent; background: linear-gradient(#020617, #020617) padding-box, linear-gradient(45deg, #3b82f6, #8b5cf6) border-box; }
        .glow { box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-6 md:p-16 min-h-screen">

    <header class="max-w-4xl mx-auto text-center mb-12">
        <h1 class="text-6xl font-black mb-4 tracking-tighter text-blue-500 italic">MINIAMI</h1>
        <p class="text-slate-500 text-[10px] tracking-[0.6em] uppercase font-black font-mono">Real-Time AI Oracle Node</p>
    </header>

    <main class="max-w-xl mx-auto">
        <div class="gradient-border p-8 mb-10 rounded-[2.5rem] glow bg-slate-900/80">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">資產採購清算 (API 連線中)</h2>
            <div class="space-y-4">
                <input type="text" id="itemName" placeholder="例如：iPhone 17 Pro Max 256GB" 
                       class="w-full p-6 bg-slate-950 border border-slate-800 rounded-2xl focus:ring-2 focus:ring-blue-500 text-white font-medium outline-none text-xl transition-all">
                <button onclick="runRealAIClearing()" id="runBtn" class="w-full bg-blue-600 text-white p-6 rounded-2xl font-black text-2xl hover:bg-blue-500 transition shadow-xl shadow-blue-900/20">
                    執行 AI 實時清算
                </button>
            </div>
            
            <div id="loading" class="hidden mt-10 flex flex-col items-center">
                <div class="animate-spin rounded-full border-4 border-slate-800 border-t-blue-500 h-12 w-12 mb-4"></div>
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest animate-pulse">正在調用 Gemini-1.5-Flash 算力...</span>
            </div>
        </div>

        <div id="resultArea" class="hidden animate-in fade-in zoom-in duration-500">
            <div class="gradient-border p-10 relative overflow-hidden bg-slate-900 rounded-[3rem]">
                <p id="targetName" class="text-blue-400 font-black text-sm mb-10 tracking-[0.2em] uppercase border-b border-slate-800 pb-2"></p>
                
                <div class="grid grid-cols-1 gap-8 mb-12">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500 text-[10px] font-black uppercase">台灣市場定價</span>
                        <span class="font-black text-slate-200 text-2xl" id="twPrice">--</span>
                    </div>
                    <div class="flex justify-between items-center text-blue-400">
                        <span class="text-[10px] font-black uppercase">MINIAMI 落地成本</span>
                        <span class="font-black text-2xl" id="landedCost">--</span>
                    </div>
                </div>

                <div class="bg-black p-8 rounded-[2rem] mb-12 border border-blue-900/30">
                    <div class="text-center mb-6">
                        <p class="text-[10px] font-black text-slate-500 mb-2 tracking-[0.5em] uppercase">Final Clearing Quote</p>
                        <p class="text-7xl font-black text-white" id="finalQuote">--</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 border-t border-slate-800 pt-6">
                        <div class="text-center">
                            <p class="text-[9px] text-slate-600 uppercase font-black">客戶獲利 (50%)</p>
                            <p class="text-emerald-400 font-black text-xl" id="clientGain">--</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] text-slate-600 uppercase font-black">管家利潤 (50%)</p>
                            <p class="text-blue-400 font-black text-xl" id="serviceFee">--</p>
                        </div>
                    </div>
                </div>

                <a href="https://line.me/R/ti/p/@MINIAMI" target="_blank" class="block w-full bg-[#06C755] text-white py-6 rounded-2xl font-black text-2xl text-center hover:opacity-90 transition">
                    簽署委任協議 (台中面交)
                </a>
            </div>
        </div>

        <div id="debugArea" class="hidden mt-10 p-4 bg-red-900/20 border border-red-900/50 rounded-xl text-[10px] font-mono text-red-400 overflow-x-auto">
            <p class="font-black mb-2 uppercase">Debug Output:</p>
            <pre id="debugOutput"></pre>
        </div>
    </main>

    <script>
        const API_KEY = "AIzaSyAZKp5sb6lYyHeF9rXKu19aDFVoR6zCbSc";

        async function runRealAIClearing() {
            const item = document.getElementById('itemName').value;
            if(!item) return alert("請輸入產品名稱");

            const btn = document.getElementById('runBtn');
            const loader = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            const debugArea = document.getElementById('debugArea');

            // UI 初始化
            btn.disabled = true;
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');
            debugArea.classList.add('hidden');

            try {
                // 採用 2026 年最穩定的 API 終端路徑
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `你現在是 MINIAMI 清算引擎。搜尋標的：「${item}」。
                                任務：
                                1. 查找 2026 年 3 月該產品的「日本含稅售價(JPY)」與「台灣官方售價(TWD)」。
                                2. 請務必只回傳 JSON 格式，不准有任何解釋文字。
                                格式範例：{"jp_jpy": 194800, "tw_twd": 44900}`
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Google API 報錯 (${response.status}): ${errorText}`);
                }

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                // 強制抽取 JSON 塊
                const jsonMatch = aiResponse.match(/\{.*\}/s);
                if (!jsonMatch) throw new Error("AI 回傳格式非標準 JSON，請重試。");
                
                const prices = JSON.parse(jsonMatch[0]);

                // 清算邏輯計算
                const EX_RATE = 0.2013; // 2026 固定匯率參考
                const jpInclusive = prices.jp_jpy;
                const twMarket = prices.tw_twd;

                // 公式：((日含稅/1.1) * 匯率) * 1.05 + 800
                const landedCost = ( (jpInclusive / 1.1) * EX_RATE ) * 1.05 + 800;
                const totalGap = twMarket - landedCost;
                const split = totalGap * 0.5;

                // 更新介面
                document.getElementById('targetName').innerText = item;
                document.getElementById('twPrice').innerText = `NT$ ${twMarket.toLocaleString()}`;
                document.getElementById('landedCost').innerText = `NT$ ${Math.round(landedCost).toLocaleString()}`;
                document.getElementById('clientGain').innerText = `NT$ ${Math.round(split).toLocaleString()}`;
                document.getElementById('serviceFee').innerText = `NT$ ${Math.round(split).toLocaleString()}`;
                document.getElementById('finalQuote').innerText = `NT$ ${Math.round(landedCost + split).toLocaleString()}`;

                resultArea.classList.remove('hidden');

            } catch (err) {
                console.error(err);
                debugArea.classList.remove('hidden');
                document.getElementById('debugOutput').innerText = err.message;
                alert("AI 清算連線中斷，請查看下方 Debug 資訊。");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
