<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIAMI | 泛亞資產清算終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .miniami-card { border: 1px solid #1e293b; background: #0f172a; }
        .text-neon { color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="p-6 md:p-24 min-h-screen flex flex-col items-center">

    <header class="text-center mb-16">
        <h1 class="text-7xl font-black mb-4 tracking-tighter italic text-neon">MINIAMI</h1>
        <p class="text-slate-500 text-[10px] tracking-[0.8em] uppercase font-black">Taichung Nantun // V36.0 Pan-Asian Network</p>
    </header>

    <main class="w-full max-w-xl">
        <div class="miniami-card p-12 mb-12 rounded-[3.5rem] shadow-2xl border border-slate-800">
            <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-10 text-center">泛亞多點狙擊：請輸入精確型號</h2>
            <div class="space-y-6">
                <input type="text" id="itemName" placeholder="例如: iPhone 17 Pro Max" class="w-full p-7 bg-black border border-slate-800 rounded-[1.5rem] text-white font-black text-2xl outline-none focus:ring-4 focus:ring-blue-500/30">
                <button onclick="runPanAsianV36()" id="runBtn" class="w-full bg-blue-600 text-white p-7 rounded-[1.5rem] font-black text-3xl hover:bg-blue-500 transition-all">執行泛亞對帳</button>
            </div>
            <div id="loading" class="hidden mt-8 text-center text-[10px] text-blue-400 font-black animate-pulse uppercase tracking-[0.2em]">正在穿透 JP/KR/VN/TH/PH 數據節點...</div>
        </div>

        <div id="resultArea" class="hidden animate-in fade-in zoom-in duration-500">
            <div class="miniami-card p-12 rounded-[4rem] border border-blue-900/40">
                <h3 id="targetName" class="text-2xl font-black text-blue-400 mb-8 text-center uppercase"></h3>
                
                <div class="mb-10 p-8 bg-slate-800/30 rounded-3xl border border-slate-800">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex flex-col">
                            <span class="text-slate-400 text-[10px] font-black uppercase">官網基準價</span>
                            <span class="text-lg text-slate-500 line-through" id="msrpPrice">--</span>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-slate-400 text-[10px] font-black">本地最低價 (<span id="sourceLabel" class="text-blue-500">來源</span>)</span>
                            <span class="text-3xl text-white font-black" id="twPrice">--</span>
                        </div>
                    </div>
                    <button id="affiliateBtn" class="w-full py-5 bg-orange-600 text-white font-black rounded-2xl shadow-lg">前往電商來源 (導購)</button>
                </div>

                <div class="space-y-6 border-t border-slate-800 pt-10">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500 text-xs font-black uppercase tracking-widest italic">泛亞最佳落地底價 (<span id="bestCountry" class="text-emerald-400">來源</span>)</span>
                        <span class="text-xl text-slate-400 font-mono" id="rawLanded">--</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-blue-500 text-sm font-black uppercase tracking-widest italic">MINIAMI 清算報價</span>
                        <span class="text-6xl text-white font-black" id="finalQuote">--</span>
                    </div>
                </div>

                <div id="profitHint" class="mt-10 p-6 bg-blue-900/20 rounded-2xl border border-blue-800 text-blue-400 font-bold text-xs text-center leading-relaxed"></div>
                
                <button onclick="window.open('https://line.me/ti/p/您的LINE')" class="w-full mt-10 bg-[#06C755] text-white py-8 rounded-[2rem] font-black text-3xl">預約南屯面交</button>
            </div>
        </div>
    </main>

    <script>
        async function runPanAsianV36() {
            const item = document.getElementById('itemName').value;
            const API_KEY = localStorage.getItem('MINIAMI_KEY');
            if(!item || !API_KEY) return;

            const btn = document.getElementById('runBtn');
            const loader = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            
            btn.disabled = true;
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `任務：作為泛亞獵人狙擊「${item}」價格。
                        1. 找尋官方 MSRP 定價。
                        2. 找尋台灣(MOMO/蝦皮/酷澎)最低全新品街價。
                        3. 深度掃描日本(JPY)、泰國(THB)、越南(VND)、菲律賓(PHP)、韓國(KRW)之當地主流電商最低價。
                        回傳 JSON：{"msrp":數字, "tw":數字, "platform":"台灣來源", "prices":{"jp":數字, "kr":數字, "th":數字, "vn":數字, "ph":數字}}` }] }]
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text.match(/\{.*\}/s)[0]);

                // 泛亞對沖矩陣計算
                const matrix = [
                    { country: "日本", cost: ( (result.prices.jp / 1.1) * 0.2013 ) * 1.05 + 800 },
                    { country: "韓國", cost: (result.prices.kr * 0.0245) * 1.05 + 1000 },
                    { country: "泰國", cost: (result.prices.th * 0.91) * 1.05 + 1200 },
                    { country: "越南", cost: (result.prices.vn * 0.0013) * 1.05 + 1500 },
                    { country: "菲律賓", cost: (result.prices.ph * 0.58) * 1.05 + 1500 }
                ];

                // 挑選成本最低的國家
                const best = matrix.reduce((prev, curr) => (prev.cost < curr.cost) ? prev : curr);
                
                let finalQuote = result.tw <= best.cost ? result.tw : best.cost + (result.tw - best.cost) * 0.5;

                document.getElementById('targetName').innerText = item;
                document.getElementById('msrpPrice').innerText = `NT$ ${Math.round(result.msrp).toLocaleString()}`;
                document.getElementById('twPrice').innerText = `NT$ ${Math.round(result.tw).toLocaleString()}`;
                document.getElementById('sourceLabel').innerText = result.platform;
                document.getElementById('bestCountry').innerText = best.country;
                document.getElementById('rawLanded').innerText = `NT$ ${Math.round(best.cost).toLocaleString()}`;
                document.getElementById('finalQuote').innerText = `NT$ ${Math.round(finalQuote).toLocaleString()}`;
                
                document.getElementById('profitHint').innerText = result.tw <= best.cost ? "🏠 泛亞掃描完成：本地電商具備最強優勢。" : `💎 泛亞對沖成功：透過 ${best.country} 節點可為您節省 NT$ ${Math.round(result.tw - finalQuote).toLocaleString()}。`;

                resultArea.classList.remove('hidden');
            } catch (err) { alert("節點數據超載，請重新狙擊。"); } finally { btn.disabled = false; loader.classList.add('hidden'); }
        }
    </script>
</body>
</html>
