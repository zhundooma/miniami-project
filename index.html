<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIAMI | 清算引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .gradient-border { border: 1px solid transparent; background: linear-gradient(#020617, #020617) padding-box, linear-gradient(45deg, #3b82f6, #8b5cf6) border-box; }
        .glow { box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body class="p-6 md:p-16 min-h-screen">

    <header class="max-w-4xl mx-auto text-center mb-12">
        <h1 class="text-6xl font-black mb-4 tracking-tighter text-blue-500 italic">MINIAMI</h1>
        <p class="text-slate-500 text-[9px] tracking-[0.6em] uppercase font-black">Node: Taichung Central // V1.7 Stable</p>
    </header>

    <main class="max-w-xl mx-auto">
        <div class="gradient-border p-8 mb-10 rounded-[2.5rem] glow bg-slate-900/50 text-center">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6 text-left">資產搜尋引擎</h2>
            <div class="space-y-4">
                <input type="text" id="itemName" placeholder="iPhone 17 Pro Max" 
                       class="w-full p-6 bg-slate-900 border border-slate-800 rounded-2xl focus:ring-2 focus:ring-blue-500 text-white font-medium outline-none text-xl">
                <button onclick="runClearing()" id="runBtn" class="w-full bg-blue-600 text-white p-6 rounded-2xl font-black text-2xl hover:bg-blue-500 transition shadow-lg">
                    執行清算
                </button>
            </div>
            <div id="loading" class="hidden mt-10 flex flex-col items-center">
                <div class="animate-spin rounded-full border-4 border-slate-800 border-t-blue-500 h-12 w-12 mb-4"></div>
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">正在從日本節點讀取利差數據...</span>
            </div>
        </div>

        <div id="resultArea" class="hidden">
            <div class="gradient-border p-10 relative overflow-hidden bg-slate-900 rounded-[3rem]">
                <p id="targetName" class="text-blue-400 font-black text-xs mb-10 tracking-[0.2em] uppercase"></p>
                <div class="space-y-6 mb-12" id="priceList">
                    <div class="flex justify-between items-end border-b border-slate-800 pb-5 text-slate-200">
                        <span class="text-slate-500 text-[10px] font-black uppercase">台灣官方定價</span>
                        <span class="font-black text-xl" id="twPriceDisplay">--</span>
                    </div>
                </div>
                <div class="text-center">
                    <p class="text-[10px] font-black text-slate-500 mb-4 tracking-[0.5em] uppercase">最終清算價</p>
                    <p class="text-7xl font-black text-white mb-12" id="finalQuoteDisplay">--</p>
                    <a href="https://line.me/ti/p/您的LINE帳號" target="_blank" class="block w-full bg-[#06C755] text-white py-6 rounded-2xl font-black text-xl text-center">
                        聯繫管家 (面交預約)
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 這是您的 API Key，已修正網址路徑為 v1beta
        const API_KEY = "AIzaSyAZKp5sb6lYyHeF9rXKu19aDFVoR6zCbSc";

        async function runClearing() {
            const itemName = document.getElementById('itemName').value;
            if(!itemName) return;
            const btn = document.getElementById('runBtn');
            const loader = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                // 修改處：使用 v1beta 路徑，這在 2026 年更穩定
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `JSON ONLY: {"jp":194800,"tw":44900} for: ${itemName}` }] }] })
                });

                if (!response.ok) throw new Error("通訊協議失敗 (Code: " + response.status + ")");

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                const prices = JSON.parse(text.match(/\{.*\}/s)[0]);
                
                // 清算邏輯
                const exRate = 0.2013;
                const landedCost = ( (prices.jp / 1.1) * exRate ) * 1.05 + 800;
                const finalQuote = landedCost + ( (prices.tw - landedCost) * 0.5 );

                document.getElementById('targetName').innerText = itemName;
                document.getElementById('twPriceDisplay').innerText = `NT$ ${prices.tw.toLocaleString()}`;
                document.getElementById('finalQuoteDisplay').innerText = `NT$ ${Math.round(finalQuote).toLocaleString()}`;
                resultArea.classList.remove('hidden');

            } catch (error) {
                alert("清算節點更新中，請確保金鑰正確或稍後再試。\n錯誤訊息: " + error.message);
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
