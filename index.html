<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIAMI | 透明清算節點</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .miniami-card { border: 1px solid transparent; background: linear-gradient(#020617, #020617) padding-box, linear-gradient(45deg, #3b82f6, #8b5cf6) border-box; }
        .glow-blue { box-shadow: 0 0 80px rgba(59, 130, 246, 0.2); }
        .audit-step { transition: all 0.4s ease; opacity: 0.5; }
        .active-step { opacity: 1; transform: scale(1.02); }
    </style>
</head>
<body class="p-6 md:p-24 min-h-screen flex flex-col items-center">

    <header class="w-full max-w-4xl text-center mb-16">
        <h1 class="text-8xl font-black mb-4 tracking-tighter text-blue-500 italic">MINIAMI</h1>
        <p class="text-slate-500 text-[10px] tracking-[0.8em] uppercase font-black font-mono">Taichung Nantun // V27.0 Transparency Update</p>
    </header>

    <main class="w-full max-w-xl">
        <div id="authArea" class="hidden mb-12 animate-in fade-in slide-in-from-top-4 duration-700">
            <div class="miniami-card p-10 rounded-[3rem] bg-slate-900/90 text-center">
                <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-6">資產清算授權</h3>
                <input type="password" id="keyInput" placeholder="輸入 API Key (AIza...)" 
                       class="w-full p-5 bg-black border border-slate-800 rounded-2xl text-white font-mono text-sm mb-4 outline-none focus:border-blue-500 text-center">
                <button onclick="saveKey()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg">啟動核心</button>
            </div>
        </div>

        <div id="searchApp" class="miniami-card p-12 mb-12 rounded-[3.5rem] bg-slate-900/95 text-center glow-blue">
            <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-10">AI 全球最低價清算系統</h2>
            <div class="space-y-6">
                <input type="text" id="itemName" placeholder="iPhone, MacBook, 或任何商品..." 
                       class="w-full p-7 bg-black border border-slate-800 rounded-[1.5rem] focus:ring-4 focus:ring-blue-500/50 text-white font-black outline-none text-2xl">
                <button onclick="runV27()" id="runBtn" class="w-full bg-blue-600 text-white p-7 rounded-[1.5rem] font-black text-3xl hover:bg-blue-500 transition-all active:scale-95 shadow-2xl">
                    執行深度清算
                </button>
            </div>
            
            <div id="auditStatus" class="hidden mt-12 space-y-4 text-left border-t border-slate-800 pt-8">
                <div id="step1" class="audit-step text-[10px] font-black text-slate-600 uppercase tracking-[0.15em]">○ 掃描 MOMO/蝦皮 街價來源...</div>
                <div id="step2" class="audit-step text-[10px] font-black text-slate-600 uppercase tracking-[0.15em]">○ 執行排除配件與雜訊審計...</div>
                <div id="step3" class="audit-step text-[10px] font-black text-slate-600 uppercase tracking-[0.15em]">○ 50/50 利差清算結算中...</div>
            </div>
        </div>

        <div id="resultArea" class="hidden animate-in fade-in zoom-in duration-700">
            <div class="miniami-card p-12 bg-slate-900 rounded-[4rem] shadow-2xl text-center">
                <h3 id="targetName" class="text-3xl font-black text-blue-400 uppercase mb-8 border-b border-slate-800 pb-6"></h3>
                
                <div class="space-y-10 mb-12">
                    <div class="flex flex-col gap-4">
                        <div class="flex justify-between items-center text-slate-400 text-sm font-black uppercase">
                            <span>本地參考來源 (<span id="sourceLabel" class="text-blue-500">掃描中</span>)</span>
                            <span class="text-3xl text-white" id="twPrice">--</span>
                        </div>
                        <button id="sourceBtn" class="w-full py-3 bg-slate-800/50 hover:bg-slate-700 text-[11px] font-black text-slate-300 rounded-xl border border-slate-700 transition-all uppercase tracking-widest">
                            查看本地來源網頁
                        </button>
                    </div>

                    <div class="flex justify-between items-center border-t border-slate-800 pt-10">
                        <span class="text-blue-500 text-sm font-black uppercase tracking-widest">MINIAMI 清算價</span>
                        <span class="text-7xl text-white font-black" id="finalQuote">--</span>
                    </div>
                </div>

                <div id="profitHint" class="mb-10 p-6 bg-blue-900/20 rounded-2xl border border-blue-800 text-blue-400 font-bold text-sm"></div>
                
                <button onclick="window.open('https://line.me/ti/p/您的LINE')" class="w-full bg-[#06C755] text-white py-8 rounded-[2rem] font-black text-3xl shadow-xl hover:scale-105 transition-all">
                    向管家預約面交
                </button>
            </div>
        </div>
        
        <button onclick="resetKey()" class="mt-8 text-[9px] text-slate-800 hover:text-red-500 uppercase tracking-widest text-center w-full">註銷授權節點</button>
    </main>

    <script>
        window.onload = () => { if(!localStorage.getItem('MINIAMI_KEY')) document.getElementById('authArea').classList.remove('hidden'); }
        function saveKey() { const k = document.getElementById('keyInput').value; if(k.startsWith('AIza')) { localStorage.setItem('MINIAMI_KEY', k); location.reload(); } }
        function resetKey() { localStorage.removeItem('MINIAMI_KEY'); location.reload(); }

        async function runV27() {
            const item = document.getElementById('itemName').value;
            const API_KEY = localStorage.getItem('MINIAMI_KEY');
            if(!item || !API_KEY) return;

            const btn = document.getElementById('runBtn');
            const statusArea = document.getElementById('auditStatus');
            const resultArea = document.getElementById('resultArea');
            
            btn.disabled = true;
            statusArea.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                // STEP 1 & 2 整合審計
                updateUI(1, "掃描 MOMO/蝦皮 市場街價...", "text-blue-400");
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你現在是 Richard 的數據審計師。
                        任務：清算「${item}」價格。
                        1. 搜尋台灣電商(MOMO, PChome, 蝦皮)與日本(Amazon JP, BicCamera)最低全新品售價。
                        2. 嚴禁抓取配件。若價格異常低(如 iPhone < 15000)，請重新搜尋。
                        3. 識別具體的台灣來源平台名稱。
                        4. 回傳 JSON：{"jp":數字, "tw":數字, "platform":"MOMO或蝦皮或PChome"}` }] }]
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text.match(/\{.*\}/s)[0]);

                updateUI(3, "計算 50/50 分潤與清算結算...", "text-emerald-400");
                
                const EX_RATE = 0.2013;
                const landed = ( (result.jp / 1.1) * EX_RATE ) * 1.05 + 800;
                let finalQuote = result.tw <= landed ? result.tw : landed + (result.tw - landed) * 0.5;

                // 渲染結果
                document.getElementById('targetName').innerText = item;
                document.getElementById('sourceLabel').innerText = result.platform || "台灣電商";
                document.getElementById('twPrice').innerText = `NT$ ${Math.round(result.tw).toLocaleString()}`;
                document.getElementById('finalQuote').innerText = `NT$ ${Math.round(finalQuote).toLocaleString()}`;
                
                // 動態生成網址：直接帶入該平台的搜尋結果頁
                const platform = result.platform || "momo";
                let searchUrl = `https://www.momoshop.com.tw/search/searchShop.jsp?keyword=${encodeURIComponent(item)}`;
                if(platform.toLowerCase().includes('shopee') || platform.toLowerCase().includes('蝦皮')) {
                    searchUrl = `https://shopee.tw/search?keyword=${encodeURIComponent(item)}`;
                } else if(platform.toLowerCase().includes('pchome')) {
                    searchUrl = `https://search.pchome.com.tw/search/all?q=${encodeURIComponent(item)}`;
                }
                
                document.getElementById('sourceBtn').onclick = () => window.open(searchUrl);
                document.getElementById('profitHint').innerText = result.tw <= landed ? "🏠 目前本地價格具備優勢。" : `💎 已對沖利差 NT$ ${Math.round((result.tw - landed)*0.5).toLocaleString()}`;

                setTimeout(() => {
                    statusArea.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                }, 800);

            } catch (err) {
                alert("數據傳輸異常，請再試一次。");
            } finally {
                btn.disabled = false;
            }
        }

        function updateUI(step, text, color) {
            const el = document.getElementById(`step${step}`);
            el.innerText = `● ${text}`;
            el.className = `audit-step text-[10px] font-black uppercase tracking-[0.15em] active-step ${color}`;
        }
    </script>
</body>
</html>
