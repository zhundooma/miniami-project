<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIAMI | 全球利差清算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .miniami-card { border: 1px solid transparent; background: linear-gradient(#020617, #020617) padding-box, linear-gradient(45deg, #3b82f6, #8b5cf6) border-box; }
    </style>
</head>
<body class="p-6 md:p-24 min-h-screen">

    <header class="max-w-4xl mx-auto text-center mb-16">
        <h1 class="text-8xl font-black mb-4 tracking-tighter text-blue-500 italic">MINIAMI</h1>
        <p class="text-slate-500 text-[10px] tracking-[0.8em] uppercase font-black font-mono text-center">Taichung Nantun Node // 2026 AI Connected</p>
    </header>

    <main class="max-w-xl mx-auto">
        <div class="miniami-card p-12 mb-12 rounded-[3.5rem] bg-slate-900/95 shadow-[0_0_60px_rgba(59,130,246,0.3)]">
            <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-10 text-center">資產利差清算引擎</h2>
            <div class="space-y-6">
                <input type="text" id="itemName" placeholder="例如：iPhone 17 Pro Max" 
                       class="w-full p-7 bg-black border border-slate-800 rounded-[1.5rem] focus:ring-4 focus:ring-blue-500/50 text-white font-black outline-none text-2xl">
                <button onclick="runClearing()" id="runBtn" class="w-full bg-blue-600 text-white p-7 rounded-[1.5rem] font-black text-3xl hover:bg-blue-500 transition-all active:scale-95 shadow-2xl">
                    執行 AI 實時清算
                </button>
            </div>
            
            <div id="loading" class="hidden mt-12 flex flex-col items-center">
                <div class="animate-spin rounded-full border-4 border-slate-800 border-t-blue-500 h-16 w-16 mb-6"></div>
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em] animate-pulse text-center">正在穿透全球數據節點...</span>
            </div>
        </div>

        <div id="resultArea" class="hidden animate-in fade-in zoom-in duration-700">
            <div class="miniami-card p-12 bg-slate-900 rounded-[4rem] shadow-2xl text-center">
                <h3 id="targetName" class="text-3xl font-black text-blue-400 uppercase mb-10 border-b border-slate-800 pb-6 text-center"></h3>
                <div class="space-y-10 mb-16">
                    <div class="flex justify-between items-center text-slate-400 text-sm font-black uppercase">
                        <span>市場參考價 (TW)</span>
                        <span class="text-3xl text-white" id="twPriceDisplay">--</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-slate-800 pt-10">
                        <span class="text-blue-500 text-sm font-black uppercase tracking-widest">MINIAMI 最終清算價</span>
                        <span class="text-7xl text-white font-black" id="finalQuoteDisplay">--</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-12 bg-black/40 p-6 rounded-3xl border border-slate-800 text-center">
                    <div>
                        <p class="text-[9px] text-slate-600 uppercase font-black mb-1">客戶獲利</p>
                        <p class="text-emerald-400 font-black text-2xl" id="clientGainDisplay">--</p>
                    </div>
                    <div class="border-l border-slate-800 text-center">
                        <p class="text-[9px] text-slate-600 uppercase font-black mb-1">管家服務費</p>
                        <p class="text-blue-400 font-black text-2xl" id="serviceFeeDisplay">--</p>
                    </div>
                </div>
                <button onclick="window.open('https://line.me/ti/p/您的LINE')" class="w-full bg-[#06C755] text-white py-8 rounded-[2rem] font-black text-3xl shadow-xl hover:brightness-110 transition">
                    聯繫管家 (面交預約)
                </button>
            </div>
        </div>

        <div id="errorLog" class="hidden mt-10 p-8 bg-red-900/10 border border-red-900/30 rounded-3xl font-mono text-[11px] text-red-500 whitespace-pre-wrap leading-relaxed"></div>
    </main>

    <script>
        // 已自動替換為您 2026/03/16 生成的新金鑰
        const API_KEY = "AIzaSyDPzTU6oeFnpPhN1tYG72-rM3cpws57uAg";

        async function runClearing() {
            const item = document.getElementById('itemName').value;
            if(!item) return;

            const btn = document.getElementById('runBtn');
            const loader = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            const errorLog = document.getElementById('errorLog');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');
            errorLog.classList.add('hidden');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Search "${item}" official prices in TW(TWD) and JP(JPY) for March 2026. Return ONLY raw JSON: {"jp": (yen), "tw": (twd)}` }] }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(`[連線異常] ${data.error.message}\n提示：請確認是否已點擊 Google Cloud 中的 ENABLE 按鈕。`);
                }

                const aiText = data.candidates[0].content.parts[0].text;
                const prices = JSON.parse(aiText.match(/\{.*\}/s)[0]);

                // 套利清算邏輯
                const EX_RATE = 0.2013;
                const landedCost = ( (prices.jp / 1.1) * EX_RATE ) * 1.05 + 800;
                const totalOptim = prices.tw - landedCost;
                const splitProfit = totalOptim * 0.5;

                document.getElementById('targetName').innerText = item;
                document.getElementById('twPriceDisplay').innerText = `NT$ ${prices.tw.toLocaleString()}`;
                document.getElementById('clientGainDisplay').innerText = `NT$ ${Math.round(splitProfit).toLocaleString()}`;
                document.getElementById('serviceFeeDisplay').innerText = `NT$ ${Math.round(splitProfit).toLocaleString()}`;
                document.getElementById('finalQuoteDisplay').innerText = `NT$ ${Math.round(landedCost + splitProfit).toLocaleString()}`;
                
                resultArea.classList.remove('hidden');

            } catch (err) {
                errorLog.innerText = `❌ 系統警報：\n${err.message}`;
                errorLog.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
